name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

env:
  APP_NAME: AI-Document-Reader

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build (universal .app + dmg)
        run: npm run tauri build -- --target universal-apple-darwin --bundles app,dmg

      - name: Package artifacts
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="dev-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          mkdir -p dist-release

          # .app → tar.gz (preserves the bundle exactly)
          tar -czf "dist-release/${APP_NAME}_${VERSION}_macos-universal.app.tar.gz" \
            -C "${BUNDLE_DIR}/macos" "AI Document Reader.app"

          # dmg (tauri names it itself; normalize the artifact name)
          DMG_PATH=$(ls "${BUNDLE_DIR}"/dmg/*.dmg | head -n1)
          cp "${DMG_PATH}" "dist-release/${APP_NAME}_${VERSION}_macos-universal.dmg"

          ls -la dist-release

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist-release/*
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # One build, two artifacts: NSIS setup exe (bootstraps the WebView2
      # runtime automatically) + a portable exe zip for install-free use.
      - name: Build (NSIS installer + exe)
        run: npm run tauri build -- --bundles nsis

      - name: Package artifacts
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/*') {
            $version = $env:GITHUB_REF_NAME.TrimStart('v')
          } else {
            $version = 'dev-' + $env:GITHUB_SHA.Substring(0, 7)
          }
          New-Item -ItemType Directory -Force -Path dist-release | Out-Null

          # NSIS setup installer
          $setup = Get-ChildItem 'src-tauri/target/release/bundle/nsis/*-setup.exe' | Select-Object -First 1
          if (-not $setup) { throw 'No NSIS setup exe produced' }
          Copy-Item $setup.FullName "dist-release/${env:APP_NAME}_${version}_windows-x64-setup.exe"

          # Portable exe (top-level of target/release only — excludes bundle/)
          $exe = Get-ChildItem 'src-tauri/target/release/*.exe' | Select-Object -First 1
          if (-not $exe) { throw 'No exe produced' }
          $stage = "stage/$env:APP_NAME"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item $exe.FullName "$stage/AI Document Reader.exe"
          Compress-Archive -Path "stage/$env:APP_NAME" `
            -DestinationPath "dist-release/${env:APP_NAME}_${version}_windows-x64-portable.zip" -Force
          Get-ChildItem dist-release

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist-release/*
          if-no-files-found: error

  release:
    # Draft release only on tag pushes; workflow_dispatch runs just produce artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: AI Document Reader ${{ github.ref_name }}
          body_path: .github/RELEASE_NOTES.md
          files: artifacts/*
